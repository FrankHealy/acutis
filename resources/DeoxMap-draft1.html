<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Detox Unit Draft Plan</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f1f5f9;
}

.plan{
    width:1600px;
    height:900px;
    margin:40px auto;
    position:relative;
    background:
        linear-gradient(to right,#dbeafe 1px,transparent 1px),
        linear-gradient(to bottom,#dbeafe 1px,transparent 1px);
    background-size:20px 20px;
}

.room{
    position:absolute;
    border:2px solid #334155;
    background:white;
    text-align:center;
    font-size:14px;
    font-weight:bold;
}

.outer{
    border-width:4px;
}

.corridor{
    position:absolute;
    border:4px solid #334155;
    background:#f8fafc;
    text-align:center;
    font-weight:bold;
}

.window-run{
    position:absolute;
    border-top:4px dashed #64748b;
}

.bed{
    position:absolute;
    width:30px;
    height:16px;
    border:2px solid #475569;
    background:#f8fafc;
}

.ensuite{
    position:absolute;
    width:14px;
    height:14px;
    border:2px solid #475569;
    background:#e2e8f0;
}

.label{
    position:absolute;
    width:100%;
    top:8px;
}

</style>
</head>


<body>

<h2 style="text-align:center">Detox Unit Draft Plan</h2>

<div class="plan">

<!-- MAIN CORRIDOR -->

<div class="corridor" style="left:250px; top:250px; width:1200px; height:120px;">
Main Corridor
</div>

<div class="window-run" style="left:280px; top:245px; width:1140px;"></div>


<!-- DETOX ROOMS -->

<script>

const rooms = [
[430,90,"01","single"],
[570,90,"02","single"],
[710,90,"03","shared"],
[850,90,"04","shared"],
[990,90,"05","single"],
[1130,90,"06","single"],
[1270,90,"07","single"],
[1410,90,"08","single"]
];

rooms.forEach(r=>{
    const div=document.createElement("div");
    div.className="room outer";
    div.style.left=r[0]+"px";
    div.style.top=r[1]+"px";
    div.style.width="120px";
    div.style.height="120px";
    div.innerHTML='<div class="label">'+r[2]+'</div>';

    const bed1=document.createElement("div");
    bed1.className="bed";
    bed1.style.left="10px";
    bed1.style.bottom="10px";

    const bed2=document.createElement("div");
    bed2.className="bed";
    bed2.style.right="10px";
    bed2.style.bottom="10px";

    div.appendChild(bed1);
    div.appendChild(bed2);

    if(r[3]){
        const en=document.createElement("div");
        en.className="ensuite";
        en.style.right="6px";
        en.style.top="6px";
        div.appendChild(en);
    }

    document.querySelector(".plan").appendChild(div);
});

</script>


<!-- SERVICE ROOMS -->

<div class="room" style="left:470px; top:420px; width:160px; height:90px;">Doctor Waiting</div>
<div class="room" style="left:650px; top:420px; width:180px; height:90px;">Toilets / Showers</div>
<div class="room" style="left:850px; top:420px; width:130px; height:90px;">Staff WC</div>
<div class="room" style="left:1010px; top:420px; width:140px; height:90px;">Smoking A</div>
<div class="room" style="left:1170px; top:420px; width:140px; height:90px;">Smoking B</div>


<!-- CLINICAL CORE -->

<div class="room" style="left:720px; top:520px; width:260px; height:170px;">Nurses Station</div>

<div class="room" style="left:810px; top:490px; width:80px; height:40px;">
</div>

<div class="room" style="left:520px; top:560px; width:170px; height:120px;">09</div>

<div class="room" style="left:1030px; top:560px; width:170px; height:120px;">
10
<div class="bed" style="left:10px; bottom:10px"></div>
<div class="bed" style="left:70px; bottom:10px"></div>
<div class="bed" style="right:10px; bottom:10px"></div>
</div>


<!-- COMMUNAL -->

<div class="room" style="left:500px; top:720px; width:250px; height:130px;">
Therapy / TV
</div>

<div class="room" style="left:980px; top:720px; width:250px; height:130px;">
Dining
</div>


<!-- LADIES UNIT ACCESS -->

<div class="room" style="left:420px; top:870px; width:200px; height:50px;">
To Ladies Unit
</div>

<div class="room" style="left:1080px; top:870px; width:200px; height:50px;">
To Ladies Unit
</div>


</div>

</body>
</html>
