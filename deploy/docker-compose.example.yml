services:
  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    image: acutis-api:local
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      Hosting__DisableHttpsRedirection: ${Hosting__DisableHttpsRedirection}
      Database__ApplyMigrationsOnStartup: ${Database__ApplyMigrationsOnStartup}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      Jwt__Authority: ${Jwt__Authority}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      Cors__Origins__0: ${Cors__Origins__0}
    ports:
      - "${API_PORT}:5000"
    networks:
      - shared

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    image: acutis-web:local
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_SECRET}
      AUTH_KEYCLOAK_ISSUER: ${AUTH_KEYCLOAK_ISSUER}
      NEXT_PUBLIC_DISABLE_AUTH: ${NEXT_PUBLIC_DISABLE_AUTH}
    ports:
      - "${WEB_PORT}:3000"
    networks:
      - shared

networks:
  shared:
    name: ${DOCKER_SHARED_NETWORK}
    external: true
