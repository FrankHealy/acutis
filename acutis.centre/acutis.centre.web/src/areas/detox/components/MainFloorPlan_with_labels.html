<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detox Floor Plan HTML Preview</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .shell-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .shell-subtitle {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <p class="shell-title">Detox floor plan HTML preview</p>
      <p class="shell-subtitle">Standalone preview using the same positioned HTML model as DetoxFloorPlan5.jsx.</p>
    </div>
    <div id="root"></div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useEffect, useRef, useState, Fragment } = React;

    const SC = 0.78;
    const s = (v) => Math.round(v * SC);

    const LABELS = {
      rm15: '15',
      fe: 'FE',
      rm14: '14',
      rm13: '13',
      rm12: '12',
      rm11: '11',
      rm10: '10',
      rm9: '9',
      rm8: '8',
      vc: 'VC',
      rm1: '1',
      rm2: '2',
      rm3: '3',
      rm4: '4',
      rm5: '5',
      rhs1: '16',
      rhs2: '6',
      rhs3: '7',
      rhs4: 'RM 7b',
      ns: 'NS',
      tr: 'TR',
      op: 'OP',
      store: 'Store',
      common: 'Detox Kitchen',
      sa2: 'SA1 (Smoking Area)',
      sa2r: 'SA2',
      lc1: 'LC1',
      storeA: 'Staff WC',
      storeB: 'Waiting Room',
      storeC: 'Utility',
      pt: 'PT',
      diamond: '',
      entrance: 'Entrance',
      se: 'SE',
      mainEntrance: 'Main Entrance',
    };

    const buttonStyle = {
      border: '1px solid #d1d5db',
      background: '#fff',
      borderRadius: 8,
      padding: '6px 10px',
      fontSize: 12,
      fontWeight: 600,
      color: '#374151',
      cursor: 'pointer',
    };

    const Rect = ({ x, y, w, h, bg = '#D9D9D9', border = '1px solid #333', style = {}, children }) => (
      <div style={{
        position: 'absolute',
        left: s(x),
        top: s(y),
        width: s(w),
        height: s(h),
        background: bg,
        border,
        boxSizing: 'border-box',
        ...style,
      }}>
        {children}
      </div>
    );

    const Room = ({ x, y, w, h, label, fontSize = 11, style = {} }) => (
      <Rect x={x} y={y} w={w} h={h} style={{ fontFamily: '"Segoe UI", Arial, sans-serif', ...style }}>
        <span style={{
          position: 'absolute',
          top: s(3),
          right: s(4),
          fontSize: s(fontSize),
          fontWeight: 700,
          lineHeight: 1.25,
          color: '#111',
          whiteSpace: 'pre-line',
        }}>
          {label}
        </span>
      </Rect>
    );

    const WALL_THIN = 1;

    const Wall = ({ x, y, w = WALL_THIN, h = WALL_THIN, color = '#111', zIndex = 2 }) => (
      <div style={{
        position: 'absolute',
        left: s(x),
        top: s(y),
        width: w <= WALL_THIN ? WALL_THIN : s(w),
        height: h <= WALL_THIN ? WALL_THIN : s(h),
        background: color,
        zIndex,
      }} />
    );

    const Roundel = ({ cx, cy, r = 10, name = '' }) => (
      <div style={{
        position: 'absolute',
        left: s(cx - r),
        top: s(cy - r),
        width: s(r * 2),
        height: s(r * 2),
        borderRadius: '50%',
        background: '#fff',
        border: '1.5px solid #555',
        boxSizing: 'border-box',
        zIndex: 4,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
      }}>
        <span style={{ fontSize: s(7), color: '#111', visibility: 'hidden', whiteSpace: 'nowrap' }}>{name}</span>
      </div>
    );

    const TwoRoundels = ({ x, y, w, h, name1 = '', name2 = '' }) => {
      const r = Math.floor(Math.min(w * 0.26, h * 0.26));
      return (
        <Fragment>
          <Roundel cx={x + w * 0.28} cy={y + h * 0.32} r={r} name={name1} />
          <Roundel cx={x + w * 0.72} cy={y + h * 0.72} r={r} name={name2} />
        </Fragment>
      );
    };

    const Hexagon = ({ x, y, w, h, label, fontSize = 13, bg = '#EBEBEB', border = '1.5px solid #333', useBorder = false }) => (
      <div style={{
        position: 'absolute',
        left: s(x),
        top: s(y),
        width: s(w),
        height: s(h),
        background: bg,
        clipPath: 'polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%)',
        ...(useBorder ? { border, borderTop: 'none', borderBottom: 'none' } : { outline: border }),
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        fontFamily: 'Arial, sans-serif',
        fontWeight: 700,
        fontSize: s(fontSize),
        color: '#111',
        boxSizing: 'border-box',
      }}>
        {label}
      </div>
    );

    const OuterHexBorder = ({ x, y, w, h }) => {
      const pts = [
        [x + w * 0.25, y],
        [x + w * 0.75, y],
        [x + w, y + h * 0.25],
        [x + w, y + h * 0.75],
        [x + w * 0.75, y + h],
        [x + w * 0.25, y + h],
        [x, y + h * 0.75],
        [x, y + h * 0.25],
      ];
      const lines = [[7, 0], [7, 6], [6, 5], [4, 3], [3, 2], [1, 2]];
      const pad = 4;
      const minX = x - pad;
      const minY = y - pad;
      const svgW = w + pad * 2;
      const svgH = h + pad * 2;
      const p = ([px, py]) => `${s(px - minX)},${s(py - minY)}`;

      return (
        <svg style={{ position: 'absolute', left: s(minX), top: s(minY), width: s(svgW), height: s(svgH), overflow: 'visible', zIndex: 1, pointerEvents: 'none' }}>
          {lines.map(([a, b], i) => {
            const [x1, y1] = p(pts[a]).split(',');
            const [x2, y2] = p(pts[b]).split(',');
            return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#C0C0C0" strokeWidth="1" />;
          })}
        </svg>
      );
    };

    const Diamond = ({ cx, cy, size, label, fontSize = 11, passageLeft = 78, passageRight = 139, fill = '#FFFDE7' }) => {
      const half = size / 2;
      const top = [cx, cy - half];
      const right = [cx + half, cy];
      const bot = [cx, cy + half];
      const left = [cx - half, cy];
      const brT = (right[0] - passageRight) / (right[0] - bot[0]);
      const brY = right[1] + brT * (bot[1] - right[1]);
      const blT = (passageLeft - left[0]) / (bot[0] - left[0]);
      const blY = left[1] + blT * (bot[1] - left[1]);
      const clipR = [passageRight, brY];
      const clipL = [passageLeft, blY];
      const gapSize = 44;
      const edgeLen = half * Math.sqrt(2);
      const ux = (right[0] - top[0]) / edgeLen;
      const uy = (right[1] - top[1]) / edgeLen;
      const gcx = (top[0] + right[0]) / 2;
      const gcy = (top[1] + right[1]) / 2;
      const g1 = [gcx - (gapSize / 2) * ux, gcy - (gapSize / 2) * uy];
      const g2 = [gcx + (gapSize / 2) * ux, gcy + (gapSize / 2) * uy];
      const jl = 6;
      const px = uy;
      const py = -ux;
      const j1a = [g1[0] - jl * px, g1[1] - jl * py];
      const j1b = [g1[0] + jl * px, g1[1] + jl * py];
      const j2a = [g2[0] - jl * px, g2[1] - jl * py];
      const j2b = [g2[0] + jl * px, g2[1] + jl * py];
      const pad = 10;
      const minX = cx - half - pad;
      const minY = cy - half - pad;
      const svgW = size + pad * 2;
      const svgH = size + pad * 2;
      const p = ([pxValue, pyValue]) => `${s(pxValue - minX)},${s(pyValue - minY)}`;
      const polyPoints = [top, right, clipR, clipL, left].map(p).join(' ');

      return (
        <svg style={{ position: 'absolute', left: s(minX), top: s(minY), width: s(svgW), height: s(svgH), overflow: 'visible', zIndex: 0 }}>
          <polygon points={polyPoints} fill={fill} stroke="none" />
          <line x1={s(left[0] - minX)} y1={s(left[1] - minY)} x2={s(top[0] - minX)} y2={s(top[1] - minY)} stroke="#111" strokeWidth="8" />
          <line x1={s(top[0] - minX)} y1={s(top[1] - minY)} x2={s(g1[0] - minX)} y2={s(g1[1] - minY)} stroke="#111" strokeWidth="8" />
          <line x1={s(g2[0] - minX)} y1={s(g2[1] - minY)} x2={s(right[0] - minX)} y2={s(right[1] - minY)} stroke="#111" strokeWidth="8" />
          <line x1={s(right[0] - minX)} y1={s(right[1] - minY)} x2={s(clipR[0] - minX)} y2={s(clipR[1] - minY)} stroke="#111" strokeWidth="8" />
          <line x1={s(clipL[0] - minX)} y1={s(clipL[1] - minY)} x2={s(left[0] - minX)} y2={s(left[1] - minY)} stroke="#111" strokeWidth="8" />
          <line x1={s(j1a[0] - minX)} y1={s(j1a[1] - minY)} x2={s(j1b[0] - minX)} y2={s(j1b[1] - minY)} stroke="#111" strokeWidth="8" />
          <line x1={s(j2a[0] - minX)} y1={s(j2a[1] - minY)} x2={s(j2b[0] - minX)} y2={s(j2b[1] - minY)} stroke="#111" strokeWidth="8" />
          {label && (
            <text x={s(cx - minX)} y={s(cy - minY)} textAnchor="middle" dominantBaseline="middle" fontSize={s(fontSize)} fontFamily="Arial, sans-serif" fontWeight="bold" fill="#111">
              {label}
            </text>
          )}
          <text x={s(gcx - minX + 8)} y={s(gcy - minY - 8)} textAnchor="start" dominantBaseline="middle" fontSize={s(9)} fontFamily="Arial, sans-serif" fontWeight="bold" fill="#333">
            {LABELS.mainEntrance}
          </text>
        </svg>
      );
    };

    function DetoxFloorPlanPreview() {
      const wrapperRef = useRef(null);
      const canvasWidth = s(1600);
      const canvasHeight = s(1400);
      const [fitScale, setFitScale] = useState(1);
      const [zoom, setZoom] = useState(1);

      useEffect(() => {
        const updateScale = () => {
          if (!wrapperRef.current) return;
          const availableWidth = wrapperRef.current.clientWidth - 40;
          if (availableWidth <= 0) return;
          setFitScale(Math.min(1, availableWidth / canvasWidth));
        };

        updateScale();
        const resizeObserver = new ResizeObserver(updateScale);
        resizeObserver.observe(wrapperRef.current);
        window.addEventListener('resize', updateScale);

        return () => {
          resizeObserver.disconnect();
          window.removeEventListener('resize', updateScale);
        };
      }, [canvasWidth]);

      const effectiveScale = fitScale * zoom;
      const zoomPercent = Math.round(zoom * 100);

      return (
        <div ref={wrapperRef} style={{ overflow: 'hidden', background: '#ffffff', border: '1px solid #e5e7eb', borderRadius: 16, padding: 24, boxShadow: '0 1px 3px rgba(15,23,42,0.08)' }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 12, fontFamily: 'Arial, sans-serif', fontSize: 13, color: '#111827', marginBottom: 12, fontWeight: 600, flexWrap: 'wrap' }}>
            <div>
              Detox Floor Plan
              <span style={{ fontSize: 10, fontWeight: 400, color: '#6b7280', marginLeft: 14 }}>
                HTML preview aligned to DetoxFloorPlan5.jsx
              </span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <button type="button" onClick={() => setZoom((current) => Math.max(0.6, current - 0.1))} style={buttonStyle}>Zoom Out</button>
              <div style={{ minWidth: 46, textAlign: 'center', fontSize: 12, color: '#4b5563' }}>{zoomPercent}%</div>
              <button type="button" onClick={() => setZoom((current) => Math.min(1.8, current + 0.1))} style={buttonStyle}>Zoom In</button>
              <button type="button" onClick={() => setZoom(1)} style={buttonStyle}>100%</button>
            </div>
          </div>

          <div style={{ display: 'flex', justifyContent: 'center' }}>
            <div style={{ position: 'relative', width: canvasWidth, height: canvasHeight, background: '#F5F5F5', boxShadow: '0 4px 24px rgba(0,0,0,0.45)', isolation: 'isolate', transform: `scale(${effectiveScale})`, transformOrigin: 'top center', marginBottom: -(canvasHeight * (1 - effectiveScale)), borderRadius: 12 }}>
              <div style={{ position: 'absolute', left: s(217), top: s(183) }}>
                <Rect x={975} y={57} w={70} h={631} bg="#FFFDE7" border="none" />
                <div style={{ position: 'absolute', left: s(897), top: s(0), width: s(148), height: s(8), background: '#111', zIndex: 2 }} />
                <Room x={927.5} y={0} w={117} h={57} label={LABELS.rm15} />
                <div style={{ position: 'absolute', left: s(1014.5), top: s(55), width: s(20), height: s(6), background: '#D9D9D9', zIndex: 3 }} />
                <div style={{ position: 'absolute', left: s(1011.5), top: s(53), width: s(3), height: s(10), background: '#111', zIndex: 3 }} />
                <div style={{ position: 'absolute', left: s(1034.5), top: s(53), width: s(3), height: s(10), background: '#111', zIndex: 3 }} />
                <div style={{ position: 'absolute', left: s(1042), top: s(19), width: s(6), height: s(20), background: '#F5F5F5', zIndex: 3 }} />
                <Rect x={905} y={8} w={20} h={49} bg="#FFFDE7" border="none" />
                <Room x={897} y={57} w={78} h={50} label={LABELS.fe} style={{ borderLeft: 'none', borderTop: 'none', borderRight: 'none', background: '#FFFDE7' }} />
                <div style={{ position: 'absolute', left: s(897), top: s(67), width: s(8), height: s(20), background: '#F5F5F5', zIndex: 3 }} />
                <div style={{ position: 'absolute', left: s(893), top: s(64), width: s(14), height: s(4), background: '#111', zIndex: 3 }} />
                <div style={{ position: 'absolute', left: s(893), top: s(87), width: s(14), height: s(4), background: '#111', zIndex: 3 }} />

                {[{ y: 107, lbl: LABELS.rm14, h: 75 }, { y: 182, lbl: LABELS.rm13, h: 75 }, { y: 257, lbl: LABELS.rm12, h: 75 }, { y: 332, lbl: LABELS.rm11, h: 75 }, { y: 407, lbl: LABELS.rm10, h: 74 }, { y: 481, lbl: LABELS.rm9, h: 74 }, { y: 555, lbl: LABELS.rm8, h: 63 }].map(({ y, lbl, h }) => <Room key={lbl} x={897.5} y={y} w={77} h={h} label={lbl} />)}

                {[{ y: 107, h: 75 }, { y: 182, h: 75 }, { y: 257, h: 75 }, { y: 332, h: 75 }, { y: 407, h: 74 }, { y: 481, h: 74 }, { y: 555, h: 63 }].map(({ y, h }, i) => {
                  const doorH = 20;
                  const doorY = y + Math.round((h - doorH) / 2);
                  return (
                    <Fragment key={i}>
                      <div style={{ position: 'absolute', left: s(972), top: s(doorY), width: s(5), height: s(doorH), background: '#D9D9D9', zIndex: 3 }} />
                      <div style={{ position: 'absolute', left: s(970), top: s(doorY - 3), width: s(8), height: s(3), background: '#111', zIndex: 3 }} />
                      <div style={{ position: 'absolute', left: s(970), top: s(doorY + doorH), width: s(8), height: s(3), background: '#111', zIndex: 3 }} />
                    </Fragment>
                  );
                })}

                <div style={{ position: 'absolute', left: s(980), top: s(160), writingMode: 'vertical-rl', textOrientation: 'mixed', fontSize: s(10), fontFamily: 'Arial', color: '#555', fontWeight: 600, letterSpacing: 1 }}>{LABELS.vc}</div>
                <Room x={967.5} y={688} w={77} h={72} label={LABELS.rhs3} />
                <Room x={967.5} y={760} w={77} h={72} label={LABELS.rhs4} />
                <Room x={1049} y={614} w={116} h={73} label={LABELS.sa2r} style={{ background: '#c8e6c9', borderLeft: 'none' }} />
                <Rect x={1045} y={614} w={12} h={73} bg="#D9D9D9" border="none" />
                <Rect x={0} y={618} w={975} h={70} bg="#FFFDE7" border="none" style={{ zIndex: 1 }} />

                <div style={{ position: 'absolute', left: s(0), top: s(610), width: s(78), height: s(8), background: '#111', zIndex: 1 }} />
                <div style={{ position: 'absolute', left: s(139), top: s(610), width: s(323), height: s(8), background: '#111', zIndex: 1 }}>
                  {[[143, 164], [197.5, 218.5], [257.5, 278.5], [316, 337], [382, 403], [433.5, 454.5]].map(([x1, x2], i) => <div key={i} style={{ position: 'absolute', left: s(x1 - 139), top: s(2), width: s(x2 - x1), height: s(4), background: '#F5F5F5' }} />)}
                </div>
                <div style={{ position: 'absolute', left: s(502), top: s(610), width: s(395), height: s(8), background: '#111', zIndex: 1 }}>
                  {Array.from({ length: 8 }, (_, i) => {
                    const spacing = 401 / 9;
                    const x1 = spacing * (i + 1) - 10;
                    return <div key={i} style={{ position: 'absolute', left: s(x1), top: s(2), width: s(21), height: s(4), background: '#F5F5F5' }} />;
                  })}
                </div>
                <div style={{ position: 'absolute', left: s(459), top: s(605), width: s(3), height: s(18), background: '#111', zIndex: 2 }} />
                <div style={{ position: 'absolute', left: s(502), top: s(605), width: s(3), height: s(18), background: '#111', zIndex: 2 }} />
                <div style={{ position: 'absolute', left: s(475), top: s(594), fontSize: s(9), fontFamily: 'Arial', fontWeight: 700, color: '#222', zIndex: 3 }}>{LABELS.se}</div>

                <div style={{ position: 'absolute', left: s(897), top: s(0), width: s(8), height: s(618), background: '#111', zIndex: 2 }}>
                  {[{ y: 107, h: 75 }, { y: 182, h: 75 }, { y: 407, h: 74 }, { y: 481, h: 74 }, { y: 555, h: 63 }].map(({ y, h }, i) => <div key={i} style={{ position: 'absolute', left: s(2), top: s(y + Math.round(h / 2) - 2), width: s(4), height: s(20), background: '#F5F5F5' }} />)}
                  <div style={{ position: 'absolute', left: s(2), top: s(268), width: s(4), height: s(14), background: '#F5F5F5' }} />
                  <div style={{ position: 'absolute', left: s(2), top: s(300), width: s(4), height: s(26), background: '#F5F5F5' }} />
                  <div style={{ position: 'absolute', left: s(2), top: s(358), width: s(4), height: s(18), background: '#F5F5F5' }} />
                </div>

                <div style={{ position: 'absolute', left: s(1041), top: s(0), width: s(8), height: s(689), background: '#111', zIndex: 2 }}>
                  <div style={{ position: 'absolute', left: s(2), top: s(561), width: s(4), height: s(20), background: '#F5F5F5' }} />
                  <div style={{ position: 'absolute', left: 0, top: s(631), width: s(8), height: s(27), background: '#FFFDE7' }} />
                  <div style={{ position: 'absolute', left: s(2), top: s(270), width: s(4), height: s(20), background: '#F5F5F5' }} />
                  <div style={{ position: 'absolute', left: s(2), top: s(316), width: s(4), height: s(20), background: '#F5F5F5' }} />
                  <div style={{ position: 'absolute', left: s(2), top: s(372), width: s(4), height: s(20), background: '#F5F5F5' }} />
                </div>

                <div style={{ position: 'absolute', left: s(1034), top: s(628), width: s(14), height: s(4), background: '#111', zIndex: 3 }} />
                <div style={{ position: 'absolute', left: s(1034), top: s(655), width: s(14), height: s(4), background: '#111', zIndex: 3 }} />
                <div style={{ position: 'absolute', left: s(1052), top: s(636), fontSize: s(9), fontFamily: 'Arial', fontWeight: 700, color: '#444', whiteSpace: 'nowrap', zIndex: 3 }}>{LABELS.entrance}</div>
                <Wall x={78} y={556} w={8} h={62} />
                <Wall x={139} y={556} w={8} h={62} />

                {[{ x: 0.5, lbl: LABELS.rm1, style: { background: '#3b82f6' } }, { x: 78.5, lbl: LABELS.rm2 }, { x: 156.5, lbl: LABELS.rm3 }, { x: 234.5, lbl: LABELS.rm4 }, { x: 305.5, lbl: LABELS.rm5 }].map(({ x, lbl, style }) => <Room key={lbl} x={x} y={688.5} w={77} h={72} label={lbl} style={style} />)}
                {[0.5, 78.5, 156.5, 234.5, 305.5].map((x, i) => {
                  const doorW = 20;
                  const doorX = x + Math.round((77 - doorW) / 2);
                  return (
                    <Fragment key={i}>
                      <div style={{ position: 'absolute', left: s(doorX), top: s(688), width: s(doorW), height: s(3), background: '#D9D9D9', zIndex: 3 }} />
                      <div style={{ position: 'absolute', left: s(doorX - 3), top: s(685), width: s(3), height: s(8), background: '#111', zIndex: 3 }} />
                      <div style={{ position: 'absolute', left: s(doorX + doorW), top: s(685), width: s(3), height: s(8), background: '#111', zIndex: 3 }} />
                    </Fragment>
                  );
