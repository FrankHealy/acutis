<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Main Floor Plan - Flat HTML Reference</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .page {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      flex-wrap: wrap;
    }
    .title { font-size: 16px; font-weight: 700; }
    .muted { font-size: 12px; color: var(--muted); }
    .controls { display: flex; align-items: center; gap: 8px; }
    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #f9fafb; }
    .viewer {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: auto;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .stage-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100%;
    }
    .stage {
      position: relative;
      width: 1994px;
      height: 1186px;
      transform-origin: top center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      background: #f5f5f5;
      border-radius: 8px;
      overflow: hidden;
    }
    svg {
      display: block;
      width: 1994px;
      height: 1186px;
    }
    .label-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .html-label {
      position: absolute;
      min-width: 48px;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.8);
      border: 1px dashed rgba(17,24,39,0.25);
      color: #374151;
      font-size: 12px;
      font-weight: 700;
      transform: translate(-50%, -50%);
      backdrop-filter: blur(1px);
    }
    .hidden { display: none; }
  </style>
</head>

  <script>
    const stage = document.getElementById('stage');
    const viewer = document.getElementById('viewer');
    const zoomValue = document.getElementById('zoomValue');

    const baseWidth = 1994;
    const baseHeight = 1186;

    // Match DetoxFloorPlan5 canonical scale
    const detoxScale = 0.78;

    // userZoom is relative to Detox scale:
    // 1.0 = same as Detox "SC = 0.78"
    let userZoom = 1;
    let fitScale = 1;

    function applyScale() {
      const displayScale = detoxScale * fitScale * userZoom;
      stage.style.transform = `scale(${displayScale})`;
      zoomValue.textContent = `${Math.round(userZoom * 100)}%`;
      stage.style.marginBottom = `${-(baseHeight * (1 - displayScale))}px`;
    }

    function fitToViewer() {
      const available = viewer.clientWidth - 36;
      fitScale = Math.min(1, available / (baseWidth * detoxScale));
      applyScale();
    }

    document.getElementById('zoomIn').addEventListener('click', () => {
      userZoom = Math.min(2, +(userZoom + 0.1).toFixed(2));
      applyScale();
    });

    document.getElementById('zoomOut').addEventListener('click', () => {
      userZoom = Math.max(0.4, +(userZoom - 0.1).toFixed(2));
      applyScale();
    });

    document.getElementById('reset').addEventListener('click', () => {
      userZoom = 1;
      applyScale();
    });

    document.getElementById('fit').addEventListener('click', fitToViewer);

    document.getElementById('toggleLabels').addEventListener('click', () => {
      document.getElementById('labelLayer').classList.toggle('hidden');
    });

    window.addEventListener('resize', fitToViewer);
    fitToViewer();
  </script>
