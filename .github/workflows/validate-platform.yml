name: Validate Acutis platform
on:
  pull_request:
  push:
    branches: [main]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      centre: ${{ steps.filter.outputs.centre }}
      practitioner: ${{ steps.filter.outputs.practitioner }}
      community: ${{ steps.filter.outputs.community }}
      outreach: ${{ steps.filter.outputs.outreach }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: ['packages/**', 'package*.json', '.github/workflows/**', 'acutis.api/Acutis.Platform.Contracts/**', 'acutis.api/Acutis.Forms.Schema/**']
            centre: ['acutis.web/**', 'acutis.tab/**', 'acutis.api/Acutis.Api/**', 'acutis.api/Acutis.Application/**', 'acutis.api/Acutis.Domain/**', 'acutis.api/Acutis.Infrastructure/**']
            practitioner: ['apps/practitioner-*/**', 'acutis.api/Acutis.Practitioner.Api/**', 'infrastructure/sql/*practitioner*']
            community: ['apps/community-*/**', 'acutis.api/Acutis.Community.Api/**', 'infrastructure/sql/*community*']
            outreach: ['apps/outreach-*/**', 'acutis.api/Acutis.Outreach.Api/**']
  shared:
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run typecheck:shared
      - run: npm run test:shared
      - run: npm run lint
  centre-web:
    needs: changes
    if: needs.changes.outputs.centre == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-node-validation.yml
    with: { workspace: acutis.web }
  centre-mobile:
    needs: changes
    if: needs.changes.outputs.centre == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-node-validation.yml
    with: { workspace: acutis.tab, run-build: true }
  practitioner-web:
    needs: changes
    if: needs.changes.outputs.practitioner == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-node-validation.yml
    with: { workspace: '@acutis/practitioner-web' }
  practitioner-mobile:
    needs: changes
    if: needs.changes.outputs.practitioner == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-node-validation.yml
    with: { workspace: '@acutis/practitioner-mobile', run-build: true }
  community-web:
    needs: changes
    if: needs.changes.outputs.community == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-node-validation.yml
    with: { workspace: '@acutis/community-web' }
  community-mobile:
    needs: changes
    if: needs.changes.outputs.community == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-node-validation.yml
    with: { workspace: '@acutis/community-mobile', run-build: true }
  outreach-web:
    needs: changes
    if: needs.changes.outputs.outreach == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-node-validation.yml
    with: { workspace: '@acutis/outreach-web' }
  outreach-mobile:
    needs: changes
    if: needs.changes.outputs.outreach == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-node-validation.yml
    with: { workspace: '@acutis/outreach-mobile', run-build: true }
  centre-api:
    needs: changes
    if: needs.changes.outputs.centre == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-dotnet-validation.yml
    with: { project: acutis.api/Acutis.Api/Acutis.Api.csproj }
  practitioner-api:
    needs: changes
    if: needs.changes.outputs.practitioner == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-dotnet-validation.yml
    with: { project: acutis.api/Acutis.Practitioner.Api/Acutis.Practitioner.Api.csproj, context: PractitionerDbContext }
  community-api:
    needs: changes
    if: needs.changes.outputs.community == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-dotnet-validation.yml
    with: { project: acutis.api/Acutis.Community.Api/Acutis.Community.Api.csproj, context: CommunityDbContext }
  outreach-api:
    needs: changes
    if: needs.changes.outputs.outreach == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-dotnet-validation.yml
    with: { project: acutis.api/Acutis.Outreach.Api/Acutis.Outreach.Api.csproj }
  dotnet-tests:
    needs: changes
    if: needs.changes.outputs.centre == 'true' || needs.changes.outputs.practitioner == 'true' || needs.changes.outputs.community == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet test acutis.api/Acutis.Api.Tests/Acutis.Api.Tests.csproj --configuration Release
